    <rect x="136" y="194" width="226" height="14" rx="7" fill="#64748B" opacity="0.35"/>
    <rect x="136" y="226" width="96" height="28" rx="14" fill="#14B8A6" opacity="0.95"/>
    <rect x="390" y="122" width="102" height="102" rx="26" fill="#7C3AED" opacity="0.86"/>
