<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">FletPlus showcase asset</title>
  <desc id="desc">Abstract gradient card used by frontend showcase examples.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="52%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#14B8A6"/>
