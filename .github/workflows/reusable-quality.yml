name: Reusable Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Run tests and compatibility checks
        run: bash tools/qa.sh --scope tests-matrix

  static-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Run static/security checks
        run: bash tools/qa.sh --scope static-security

  flet-version-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Actualizar esta matriz de forma mensual o cuando haya un release crítico de Flet
        # (breaking changes, deprecaciones relevantes o ajustes de política de soporte).
        # Política vigente:
        # - baseline: menor mínimo soportado activamente por el proyecto.
        # - target: última minor estable publicada en PyPI para validar migraciones.
        # Procedimiento de actualización:
        # 1) Revisar en PyPI la última minor estable de `flet`.
        # 2) Mantener `min-supported` alineado con la baseline definida por el proyecto.
        # 3) Actualizar `tools/flet_version_matrix_config.py` (ALLOWED_FLET_MINORS)
        #    para reflejar exactamente los minors probados aquí.
        include:
          - label: min-supported
            flet-spec: flet>=0.29,<0.30
            expected-minor: "0.29"
          - label: latest-migration-target
            flet-spec: flet>=0.80,<0.81
            expected-minor: "0.80"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies for Flet matrix
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install --upgrade "${{ matrix.flet-spec }}"

      - name: Run Flet version matrix compatibility test
        env:
          FLET_MATRIX_EXPECTED_MINOR: ${{ matrix.expected-minor }}
        run: python -m pytest tests/test_flet_version_matrix.py
