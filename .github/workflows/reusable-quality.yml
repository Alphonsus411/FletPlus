name: Reusable Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Run tests and compatibility checks
        run: bash tools/qa.sh --scope tests-matrix

  static-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Run static/security checks
        run: bash tools/qa.sh --scope static-security

  flet-version-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: baseline
            flet-spec: flet==0.27.6
            expected-minor: "0.27"
          - label: migration-target
            flet-spec: flet>=0.28,<0.29
            expected-minor: "0.28"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies for Flet matrix
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install --upgrade "${{ matrix.flet-spec }}"

      - name: Run Flet version matrix compatibility test
        env:
          FLET_MATRIX_EXPECTED_MINOR: ${{ matrix.expected-minor }}
        run: python -m pytest tests/test_flet_version_matrix.py
