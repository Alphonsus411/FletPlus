name: Reusable Quality

on:
  workflow_call:

jobs:
  tests-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Run tests and compatibility checks
        run: bash tools/qa.sh --scope tests-matrix

  static-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Run static/security checks
        run: bash tools/qa.sh --scope static-security
