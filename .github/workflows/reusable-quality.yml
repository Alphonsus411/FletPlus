name: Reusable Quality

on:
  workflow_call:
    inputs:
      run-real-flet-build:
        description: "Run optional real flet build jobs that invoke flet build"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  tests-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Validate Flet baseline/target drift
        run: python tools/check_flet_target_drift.py

      - name: Run tests and compatibility checks
        run: bash tools/qa.sh --scope tests-matrix

  static-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate CI/docs contract
        run: python tools/check_ci_workflow_contract.py

      - name: Validate Flet baseline/target drift
        run: python tools/check_flet_target_drift.py

      - name: Run static/security checks
        run: bash tools/qa.sh --scope static-security

  cross-platform-lightweight:
    name: Lightweight CLI/docs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight QA dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-docs.txt
          python -m pip install -e .

      - name: Validate fletplus create templates
        run: python -m pytest tests/test_cli_create.py tests/test_cli_template_contracts.py

      - name: Validate fletplus build parsing and strategy contracts
        run: python -m pytest tests/test_rendering_strategies.py

      - name: Validate installer generation without packaging
        run: python -m pytest tests/test_cli_installer.py

      - name: Validate documentation checks
        run: |
          python tools/check_canonical_repo_links.py
          python tools/check_optional_dependency_refs.py
          mkdocs build --strict --site-dir site

  real-flet-builds:
    name: Manual real flet build (${{ matrix.os }})
    if: ${{ inputs.run-real-flet-build }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Create smoke project
        run: fletplus create ci-smoke --template app

      - name: Run real flet build
        working-directory: ci-smoke
        run: flet build web

  flet-version-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Actualizar esta matriz de forma mensual o cuando haya un release crítico de Flet
        # (breaking changes, deprecaciones relevantes o ajustes de política de soporte).
        # Política vigente:
        # - baseline: menor mínimo soportado activamente por el proyecto.
        # - target: último patch estable documentado para el minor objetivo vigente.
        # Procedimiento de actualización:
        # 1) Revisar en PyPI el último patch estable de `flet` para el minor objetivo.
        # 2) Mantener `min-supported` alineado con la baseline definida por el proyecto.
        # 3) FUENTE DE VERDAD ÚNICA: `tools/flet_version_matrix_config.py`
        #    (FLET_MATRIX_MINORS / ALLOWED_FLET_MINORS).
        # 4) Reflejar exactamente ese mismo set de minors en esta matriz.
        # 5) Verificar drift con `python tools/check_flet_target_drift.py`.
        include:
          - label: min-supported
            flet-spec: flet>=0.80,<0.81
            expected-minor: "0.80"
          - label: latest-migration-target
            flet-spec: flet==0.85.3
            expected-minor: "0.85"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies for Flet matrix
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install --upgrade "${{ matrix.flet-spec }}"

      - name: Run Flet version matrix compatibility test
        env:
          FLET_MATRIX_EXPECTED_MINOR: ${{ matrix.expected-minor }}
        run: python -m pytest tests/test_flet_version_matrix.py
