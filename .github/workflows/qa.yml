name: QA

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run-real-flet-build:
        description: "Run optional real flet build jobs"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  qa:
    uses: ./.github/workflows/reusable-quality.yml
    with:
      run-real-flet-build: ${{ github.event_name == 'workflow_dispatch' && inputs.run-real-flet-build }}
